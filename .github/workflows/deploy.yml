name: Deploy to Cloudflare

on:
  push:
    branches:
      - main # 每次推送到 main 分支时自动触发

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Cache Remix build
        uses: actions/cache@v4
        with:
          path: |
            .cache
            node_modules/.cache
          key: ${{ runner.os }}-remix-build-${{ hashFiles('package-lock.json') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-remix-build-${{ hashFiles('package-lock.json') }}-
            ${{ runner.os }}-remix-build-

      - name: Install Dependencies
        # 使用 ci 代替 install，增加 --prefer-offline 减少网络请求
        run: npm ci --legacy-peer-deps --prefer-offline --no-audit

      - name: Ensure Production Queue Exists
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler queues create orange-meets-feedback-queue || true

      - name: Build and Deploy
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          NODE_OPTIONS: '--max-old-space-size=4096'
          WRANGLER_ARGS: '-c wrangler.production.toml'
        run: npm run deploy

      - name: Apply D1 Migrations (Production)
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npm run db:migrate:production
