name: Deploy to Cloudflare

on:
  push:
    branches:
      - main # 每次推送到 main 分支时自动触发

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Cache Remix build
        uses: actions/cache@v4
        with:
          path: |
            .cache
            node_modules/.cache
          key: ${{ runner.os }}-remix-build-${{ hashFiles('package-lock.json') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-remix-build-${{ hashFiles('package-lock.json') }}-
            ${{ runner.os }}-remix-build-

      - name: Install Dependencies
        # 使用 ci 代替 install，增加 --prefer-offline 减少网络请求
        run: npm ci --legacy-peer-deps --prefer-offline --no-audit

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack

      - name: Build E2EE WASM worker
        run: npm run build:e2ee-worker

      - name: Build and Deploy
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          NODE_OPTIONS: '--max-old-space-size=4096'
          WRANGLER_ARGS: '-c wrangler.production.toml'
        run: npm run deploy

      - name: Purge E2EE cache (optional)
        if: ${{ secrets.CLOUDFLARE_ZONE_ID != '' && vars.CLOUDFLARE_SITE_URL != '' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CLOUDFLARE_SITE_URL: ${{ vars.CLOUDFLARE_SITE_URL }}
        run: |
          set -euo pipefail
          BASE_URL="${CLOUDFLARE_SITE_URL%/}"
          curl --fail --silent --show-error \
            -X POST "https://api.cloudflare.com/client/v4/zones/${CLOUDFLARE_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data "{\"files\":[\"${BASE_URL}/e2ee/worker.js\",\"${BASE_URL}/e2ee/wasm-pkg/orange_mls_worker.js\",\"${BASE_URL}/e2ee/wasm-pkg/orange_mls_worker_bg.wasm\"]}"

      - name: Skip E2EE cache purge (missing config)
        if: ${{ !(secrets.CLOUDFLARE_ZONE_ID != '' && vars.CLOUDFLARE_SITE_URL != '') }}
        run: echo "Skipping E2EE cache purge. Set secrets.CLOUDFLARE_ZONE_ID and vars.CLOUDFLARE_SITE_URL to enable."

      - name: Verify D1 Access (Production)
        env:
          CLOUDFLARE_ACCOUNT_ID: 7829299e6cefc232ded8635f50b53462
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler d1 list -c wrangler.production.toml

      - name: Apply D1 Migrations (Production)
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npm run db:migrate:production
