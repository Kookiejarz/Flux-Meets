name = "orange-meets"

account_id = "7829299e6cefc232ded8635f50b53462"
main = "build/index.mjs"
# https://developers.cloudflare.com/workers/platform/compatibility-dates
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[site]
  bucket = "./public"

[[durable_objects.bindings]]
name = "rooms"
class_name = "ChatRoom"

[triggers]
crons = ["0 * * * *"]

[vars]

E2EE_ENABLED = "true"

CALLS_APP_ID = "f3324a25c97d9902cff9018a0efcf3b1"
CALLS_API_URL = "https://rtc.live.cloudflare.com/v1"
TURN_SERVICE_ID = "3dba939d4fa9d8bf17639482bc2c2c61"

EXPERIMENTAL_SIMULCAST_ENABLED = "true"
BACKGROUND_IMAGE_URL = "https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=2564&auto=format&fit=crop"

# 视频流
MAX_WEBCAM_BITRATE = 15500000
MAX_WEBCAM_FRAMERATE = 60
MAX_WEBCAM_QUALITY_LEVEL = 1080

# 音频流
MAX_AUDIO_BITRATE = 256000
AUDIO_ADAPT_CHECK_INTERVAL_MS = 2000
AUDIO_ADAPT_STABLE_DURATION_MS = 10000
AUDIO_ADAPT_STABLE_LOSS_THRESHOLD = 0.02
AUDIO_ADAPT_STABLE_RTT_MS = 170
AUDIO_ADAPT_UNSTABLE_LOSS_THRESHOLD = 0.05
AUDIO_ADAPT_UNSTABLE_RTT_MS = 300
AUDIO_ADAPT_BAD_LOSS_THRESHOLD = 0.08
AUDIO_ADAPT_BAD_RTT_MS = 450
AUDIO_ADAPT_VERY_BAD_LOSS_THRESHOLD = 0.512
AUDIO_ADAPT_VERY_BAD_RTT_MS = 600
CAPTION_FADE_START_MS = 2900
CAPTION_REMOVE_MS = 3500
CAPTION_CLEANUP_INTERVAL_MS = 300
MEETING_RETENTION_MINUTES = 720

# ====== 云端CC（语音识别） ======
# 选择 ASR 提供商: workers-ai 或 assembly-ai (推荐)
ASR_PROVIDER = "assembly-ai"
ENABLE_WORKERS_AI_ASR = "false"  # 启用云端CC（向后兼容）
WORKERS_AI_ASR_MODEL = "@cf/deepgram/nova-3"  # Deepgram 语音识别模型

# Assembly AI 配置（可选）
# 如需启用 Assembly AI，配置如下:
# ASR_PROVIDER = "assembly-ai"
# ASSEMBLY_AI_API_KEY = "your_api_key"  # 从https://www.assemblyai.com/dashboard获取
ASSEMBLY_AI_ASR_MODEL = "universal-streaming-multilingual"  # universal-streaming-multilingual 流式模型（推荐）

# ====== 翻译功能（三选一） ======
# 作用：将字幕实时翻译成目标语言，客户端根据用户浏览器语言过滤显示

# 翻译提供商选择: openai, gemini, workers-ai
TRANSLATION_PROVIDER = "inception"  # 推荐 openai, Inception或 gemini

# 选项1: OpenAI 翻译（质量好，成本较高）
OPENAI_TRANSLATION_MODEL = "gpt-5-nano-2025-08-07"  # 或 gpt-4o, gpt-3.5-turbo

# 选项2: Gemini 翻译（推荐，质量好+免费额度大）
# GEMINI_API_KEY = "your_gemini_api_key"  # 从 https://aistudio.google.com/apikey 获取
GEMINI_TRANSLATION_MODEL = "gemini-3.1-flash-lite-preview"  # 或 gemini-1.5-flash, gemini-1.5-pro

#  选项3: Inception 翻译（推荐，速度快）
INCEPTION_TRANSLATION_MODEL= "mercury-2"

# 选项3: Workers AI 翻译（Cloudflare原生，免费但质量一般）
ENABLE_WORKERS_AI = "false"
WORKERS_AI_TRANSLATION_MODEL = "@cf/meta/m2m100-1.2b"

# 翻译目标语言（逗号分隔）
# 服务端翻译成这些语言，客户端根据 displayCaptionLanguage 设置过滤
# 默认 "en,zh" 覆盖大部分用户，可添加 ja,ko,es,fr,de 等
WORKERS_AI_TRANSLATION_TARGET_LANGS = "en,zh"

# ====== AI 助手（可选） ======
OPENAI_MODEL_ID = ""

[[d1_databases]]
binding = "DB" # i.e. available in your Worker on env.DB
database_name = "orange-meets-db"
database_id = "722818b7-63af-4395-bad1-c68ce86d2bd4"

[ai]
binding = "AI"
remote = true

# Durable Object migrations
[[migrations]]
tag = "v1" # Should be unique for each entry
new_classes = ["ChatRoom"]

[observability]
enabled = true

# The necessary secrets are:
# - CALLS_APP_SECRET
# - OPENAI_API_TOKEN (if using OpenAI realtime AI or OpenAI Translation)
# - GEMINI_API_KEY (if using Gemini Translation)
# - ASSEMBLY_AI_API_KEY (if using Assembly AI for ASR)
# Run `echo <VALUE> | wrangler secret put <NAME>` for each of these

# Optional vars/secrets for OpenAI realtime AI:
# OPENAI_MODEL_ENDPOINT = ""


